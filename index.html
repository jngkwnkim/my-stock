<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JK's 부자되기 투자 노트 (Pure Live)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #0b0f19; color: #f3f4f6; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 3px; }
        .tab-btn.active { background-color: #1e293b; color: #ffd700; border-color: #ffd700; }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen pb-16">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-800 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-black tracking-tight text-white flex items-center gap-2">
                    📊 JK's 부자되기 투자 노트 <span class="text-xs bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-2 py-0.5 rounded-full font-bold">100% REAL LIVE</span>
                </h1>
                <p class="text-gray-400 mt-1 text-xs md:text-sm">임시 연산 보정 로직 전면 제거 · 글로벌 거래소 순수 데이터 수집 중</p>
            </div>
            <div class="flex gap-2 w-full md:w-auto">
                <button onclick="refreshAllData()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-4 py-3 rounded-xl transition-all shadow-lg w-full md:w-auto cursor-pointer">
                    🔄 데이터 즉시 동기화 (CORS Bypass)
                </button>
            </div>
        </header>

        <div class="bg-gray-950 rounded-2xl border border-gray-800 overflow-hidden shadow-lg mb-8">
            <div class="p-4 bg-gray-900/40 border-b border-gray-800 flex justify-between items-center">
                <h2 class="font-bold text-xs md:text-sm text-white flex items-center gap-2">
                    <span id="status-dot" class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    정식 웹 프록시 기반 실시간 자산 계기판
                </h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs md:text-sm text-gray-400">
                    <thead class="bg-gray-900/60 text-[10px] md:text-xs uppercase text-gray-400 border-b border-gray-800">
                        <tr>
                            <th class="p-4 font-semibold">종목 코드</th>
                            <th class="p-4 font-semibold">진짜 실시간 현재가</th>
                            <th class="p-4 font-semibold">실제 당일 변동률</th>
                            <th class="p-4 font-semibold text-center">동작</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table-body" class="divide-y divide-gray-900">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="detail-section" class="hidden bg-gray-950 p-5 rounded-2xl border border-gray-800 grid grid-cols-1 lg:grid-cols-3 gap-6 shadow-2xl">
            <div class="lg:col-span-2 flex flex-col gap-5">
                <h3 id="detail-title" class="text-base md:text-lg font-bold text-white">🏢 데이터 분석 룸</h3>
                <div class="h-64 md:h-80 bg-gray-900/50 rounded-xl p-3 border border-gray-800">
                    <canvas id="stockChart" class="w-full h-full"></canvas>
                </div>
            </div>
            <div class="lg:col-span-1 bg-gray-900/40 p-4 rounded-xl border border-gray-800 flex flex-col gap-4">
                <h4 class="text-sm font-bold text-white">📊 실시간 통신 로그 세션</h4>
                <div id="log-box" class="bg-black/60 p-3 rounded-lg text-[11px] font-mono text-emerald-400 h-64 overflow-y-auto leading-relaxed">
                    시스템 대기 중...
                </div>
            </div>
        </div>
    </div>

    <script>
        let watchlist = ['TSLA', 'MSFT', 'IONQ', 'AAPL'];
        let cachedStockData = {};
        let chartInstance = null;

        function logMessage(msg) {
            const box = document.getElementById('log-box');
            if(box) {
                box.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
                box.scrollTop = box.scrollHeight;
            }
        }

        // 🌐 CORS 프록시 게이트웨이를 경유하여 야후 파이낸스 리얼 데이터망 추출 엔진
        async function fetchPureMarketData(ticker) {
            logMessage(`${ticker} 진짜 데이터 조회 시작...`);
            
            // 공용 CORS 우회 허브 프록시 라우터 배열 지정
            const proxies = [
                'https://api.allorigins.win/get?url=',
                'https://corsproxy.io/?'
            ];
            
            const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=1mo&interval=1d`;
            
            // 1번 프록시(AllOrigins) 채널 가동
            try {
                const res = await fetch(`${proxies[0]}${encodeURIComponent(targetUrl)}`);
                if(res.ok) {
                    const outerJson = await res.json();
                    // AllOrigins는 문자열로 감싸서 리턴하므로 파싱 재처리
                    const json = typeof outerJson.contents === 'string' ? JSON.parse(outerJson.contents) : outerJson.contents;
                    
                    const chart = json?.chart?.result?.[0];
                    if (chart && chart.indicators?.quote?.[0]?.close) {
                        const meta = chart.meta;
                        const closes = chart.indicators.quote[0].close.filter(v => v !== null);
                        const finalPrice = meta.regularMarketPrice || closes[closes.length-1];
                        const prevClose = meta.previousClose || closes[closes.length-2];
                        const changePct = ((finalPrice - prevClose) / prevClose) * 100;
                        
                        let timestamps = chart.timestamp || [];
                        let labels = timestamps.slice(-20).map(t => {
                            let d = new Date(t * 1000);
                            return `${d.getMonth()+1}/${d.getDate()}`;
                        });

                        logMessage(`${ticker} 수급 성공! 현재가: $${finalPrice.toFixed(2)}`);
                        return {
                            ticker: ticker,
                            price: finalPrice,
                            change: changePct,
                            history: closes.slice(-20),
                            labels: labels
                        };
                    }
                }
            } catch(e) {
                logMessage(`${ticker} 1차 프록시 우회 지연, 2차 백업선 전환...`);
            }

            // 2번 프록시(CorsProxy.io) 백업망 순차 가동
            try {
                const res = await fetch(`${proxies[1]}${targetUrl}`);
                if(res.ok) {
                    const json = await res.json();
                    const chart = json?.chart?.result?.[0];
                    const meta = chart.meta;
                    const closes = chart.indicators.quote[0].close.filter(v => v !== null);
                    const finalPrice = meta.regularMarketPrice || closes[closes.length-1];
                    const prevClose = meta.previousClose || closes[closes.length-2];
                    const changePct = ((finalPrice - prevClose) / prevClose) * 100;
                    
                    let timestamps = chart.timestamp || [];
                    let labels = timestamps.slice(-20).map(t => {
                        let d = new Date(t * 1000);
                        return `${d.getMonth()+1}/${d.getDate()}`;
                    });

                    logMessage(`${ticker} 2차 백업망 수급 성공! $${finalPrice.toFixed(2)}`);
                    return { ticker: ticker, price: finalPrice, change: changePct, history: closes.slice(-20), labels: labels };
                }
            } catch(e) {
                logMessage(`🚨 ${ticker} 완전 통신 장애 발생.`);
            }

            // 통신이 완전히 막히면 가짜 값을 주지 않고 빈 값을 리턴해 로딩 오류를 노출시킵니다.
            return null;
        }

        async function refreshAllData() {
            document.getElementById('status-dot').className = "inline-block w-2.5 h-2.5 rounded-full bg-amber-500 animate-spin";
            const logBox = document.getElementById('log-box');
            if(logBox) logBox.innerHTML = "";
            
            const tbody = document.getElementById('stock-table-body');
            tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500 animate-pulse">🌐 글로벌 실시간 프록시망에서 순수 거래소 시세를 원격 수급 중입니다...</td></tr>`;

            for(let t of watchlist) {
                const liveData = await fetchPureMarketData(t);
                if(liveData) {
                    cachedStockData[t] = liveData;
                }
            }

            renderTable();
            document.getElementById('status-dot').className = "inline-block w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse";
        }

        function renderTable() {
            const tbody = document.getElementById('stock-table-body');
            let html = '';

            watchlist.forEach(t => {
                const data = cachedStockData[t];
                if(data) {
                    const cColor = data.change >= 0 ? 'text-emerald-400' : 'text-red-500';
                    html += `
                        <tr class="hover:bg-gray-900/40 border-b border-gray-900 cursor-pointer" onclick="openDetail('${t}')">
                            <td class="p-4 font-bold text-white">${data.ticker}</td>
                            <td class="p-4 font-mono font-bold text-gray-100">$${data.price.toFixed(2)}</td>
                            <td class="p-4 font-mono ${cColor} font-semibold">${data.change >= 0 ? '+' : ''}${data.change.toFixed(2)}%</td>
                            <td class="p-4 text-center">
                                <button class="bg-gray-900 border border-gray-800 text-gray-300 px-3 py-1 rounded-md text-xs hover:border-amber-500">차트 룸</button>
                            </td>
                        </tr>
                    `;
                } else {
                    html += `
                        <tr class="border-b border-gray-900">
                            <td class="p-4 font-bold text-gray-600">${t}</td>
                            <td colspan="3" class="p-4 text-xs text-red-400">⚠️ CORS 게이트웨이 혼잡으로 인한 실시간 주가 수급 지연 (새로고침 요망)</td>
                        </tr>
                    `;
                }
            });
            tbody.innerHTML = html;
        }

        function openDetail(ticker) {
            const data = cachedStockData[ticker];
            if(!data) return;

            document.getElementById('detail-section').classList.remove('hidden');
            document.getElementById('detail-title').innerText = `🏢 ${ticker} 실제 히스토리 차트 (최근 20거래일)`;

            const ctx = document.getElementById('stockChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: `${ticker} 거래소 실제 종가`,
                        data: data.history,
                        borderColor: '#00f2fe',
                        borderWidth: 2,
                        fill: false,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        x: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } },
                        y: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } }
                    }
                }
            });
        }

        window.onload = function() { refreshAllData(); };
    </script>
</body>
</html>
